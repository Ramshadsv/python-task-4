{% extends 'base.html' %}
{% block title %}Add Student — FlaskRBAC{% endblock %}
{% block content %}
<div class="page-header">
  <h1>Add Student</h1>
  <a href="{{ url_for('admin_dashboard') }}" class="btn btn-ghost">← Back</a>
</div>
<div class="card" style="max-width:480px">
  <div class="card-title">Student Details</div>
  <form method="POST">
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" name="name" required placeholder="John Doe">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" name="email" required placeholder="john@example.com">
    </div>
    <div class="form-group">
      <label>Course</label>
      <input type="text" name="course" required placeholder="e.g. Python Full Stack">
    </div>
    <div style="display:flex;gap:.75rem;margin-top:.5rem">
      <button type="submit" class="btn btn-success">Add Student</button>
      <a href="{{ url_for('admin_dashboard') }}" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
