{% extends 'base.html' %}
{% block title %}Edit Student — FlaskRBAC{% endblock %}
{% block content %}
<div class="page-header">
  <h1>Edit Student</h1>
  <a href="{{ url_for('admin_dashboard') }}" class="btn btn-ghost">← Back</a>
</div>
<div class="card" style="max-width:480px">
  <div class="card-title">Update Details (ID: {{ student.id }})</div>
  <form method="POST">
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" name="name" required value="{{ student.name }}">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" name="email" required value="{{ student.email }}">
    </div>
    <div class="form-group">
      <label>Course</label>
      <input type="text" name="course" required value="{{ student.course }}">
    </div>
    <div style="display:flex;gap:.75rem;margin-top:.5rem">
      <button type="submit" class="btn btn-warning">Save Changes</button>
      <a href="{{ url_for('admin_dashboard') }}" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
